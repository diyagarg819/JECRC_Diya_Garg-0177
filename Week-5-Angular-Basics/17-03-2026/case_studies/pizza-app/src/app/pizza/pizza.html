<label>Pizza Name :</label>
<input type="text" [(ngModel)]="pizzaName" name="pizzaName">

<br>

<label>Quantity :</label>
<input type="text" [(ngModel)]="quantity" name="quantity">

<br>

<label>Delivery Address :</label>
<textarea [(ngModel)]="address" name="address"></textarea>

<br>

<h3>Order Summary</h3>

<p>Pizza : {{pizzaName}}</p>
<p>Quantity: {{quantity}}</p>
<p>Address : {{address}}</p>
