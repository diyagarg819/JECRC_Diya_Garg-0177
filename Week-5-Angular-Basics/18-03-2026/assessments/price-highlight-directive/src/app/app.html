<h2>Product Price Dashboard</h2>

<div *ngFor="let p of products" class="card">

  <h3>{{ p.name }}</h3>

  <p [appPriceHighlight]="p.price">
    Price: ₹{{ p.price }}
  </p>

  <p>
    Status: 
    <span *ngIf="p.price > 50000; else normal">High Value</span>
    <ng-template #normal>Normal</ng-template>
  </p>

</div>
