<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Track User Login Activity</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

input{
    padding:10px;
    margin:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>User Login</h2>

<input id="username" placeholder="Enter Username">

<br>

<button onclick="login()">Login</button>

</div>

<script>

// Simple logger object
const logger = {

    log: function(level, message, data){

        const logData = {
            level: level,
            message: message,
            data: data,
            time: new Date().toISOString()
        };

        console.log("Sending log:", logData);

        // Send log to remote server
        fetch("https://example.com/api/logs", {
            method: "POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify(logData)
        })
        .then(response => console.log("Log sent successfully"))
        .catch(error => console.error("Log failed", error));
    }

};

function login(){

const user = document.getElementById("username").value;

logger.log("INFO", "User Login Attempt", {username:user});

}

</script>

</body>

</html>
